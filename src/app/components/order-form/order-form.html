<div class="checkout-container">
  <div *ngIf="isOrderComplete" class="success-box">
    <h2 class="success-title">ORDER RECEIVED! 🔥</h2>
    <p>Your vibe-checked meal is being prepared.</p>
    <button routerLink="/" class="explore-btn" style="margin-top: 20px;">Return Home</button>
  </div>

  <div *ngIf="!isOrderComplete" class="cart-details">
    <h1 class="page-title">Your Order Summary</h1>
    
    <div *ngIf="(cartService.getItems() | async)?.length === 0" class="empty-msg">
      <p>Your cart is empty.</p>
      <button routerLink="/menu" class="explore-btn">Back to Menu</button>
    </div>

    <div *ngIf="(cartService.getItems() | async) as cartItems">
      <div *ngIf="cartItems.length > 0">
        <div class="item-list">
          <div *ngFor="let item of cartItems" class="cart-item">
            <span>{{ item.name }}</span>
            <span>${{ item.price }}</span>
          </div>
        </div>
        
        <div class="total-section">
          <h3>Total: ${{ cartService.getTotal() }}</h3>
        </div>

        <button (click)="submitOrder()" class="explore-btn" style="width: 100%;">
          Complete Order
        </button>
        <div *ngIf="isOrderComplete" class="success-box">

  </div>

  <button routerLink="/" class="explore-btn" style="margin-top: 20px;">Submit & Return Home</button>
</div>

</div>
